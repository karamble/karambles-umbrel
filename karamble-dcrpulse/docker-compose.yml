services:
  app_proxy:
    environment:
      APP_HOST: karamble-dcrpulse_dashboard_1
      APP_PORT: 8735

  init:
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    user: "0:0"
    restart: "no"
    command: ["sh", "-c", "mkdir -p /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex && chown -R 1000:1000 /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex"]
    volumes:
      - ${APP_DATA_DIR}:/host

  dcrd:
    image: ghcr.io/karamble/dcrpulse-dcrd:2.0.0-rc2@sha256:71bd4feddda5d30a9fb79b8d142a6bf53fc7f7f2e3f5650b3089b5ec0c49207b
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
    environment:
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_EXTRA_ARGS: --txindex
      TOR_PROXY_IP: ${TOR_PROXY_IP}
      TOR_PROXY_PORT: ${TOR_PROXY_PORT}
    command: >
      --rpcuser=${APP_SEED}
      --rpcpass=${APP_SEED}
      --rpclisten=0.0.0.0:9109
      --rpccert=/app-data/dcrd/rpc.cert
      --rpckey=/app-data/dcrd/rpc.key
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -k -u ${APP_SEED}:${APP_SEED} -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"1.0\",\"method\":\"getinfo\",\"params\":[],\"id\":1}' https://127.0.0.1:9109 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  dcrwallet:
    image: ghcr.io/karamble/dcrpulse-dcrwallet:2.0.0-rc2@sha256:eb1a1b364e0070f17d3e554957272cf6ec99421ec69f5b783a74b337141eebc9
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
    environment:
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_HOST: dcrd
      DCRWALLET_GAP_LIMIT: 400
      TOR_PROXY_IP: ${TOR_PROXY_IP}
      TOR_PROXY_PORT: ${TOR_PROXY_PORT}
    depends_on:
      dcrd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9110 && nc -z 127.0.0.1 9111 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  dcrlnd:
    image: ghcr.io/karamble/dcrpulse-dcrlnd:2.0.0-rc2@sha256:58c6afaf8663d4abe2a0835a080d41b9d4d83e660c51b858e3d558f2407731df
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
    environment:
      DCRWALLET_HOST: dcrwallet
      DCRWALLET_GRPC_PORT: 9111
      LN_TESTNET: "false"
    depends_on:
      init:
        condition: service_completed_successfully
      dcrwallet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 10009 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  brclientd:
    image: ghcr.io/karamble/dcrpulse-brclientd:2.0.0-rc2@sha256:6a509afeb7fc84fefc2b33a049a112c28f2e054758c8e78a9322e6aaa09cac8d
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd:ro
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd
    depends_on:
      init:
        condition: service_completed_successfully
      dcrlnd:
        condition: service_started

  dcrdex:
    image: ghcr.io/karamble/dcrpulse-dcrdex:2.0.0-rc2@sha256:fec1f3f13d9aa5edd487079365ffe7e0a2b89ebe356b94312fcab56feb542c76
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
    volumes:
      - ${APP_DATA_DIR}/dcrdex:/dex/.dexc
      - ${APP_DATA_DIR}/data:/app-data:ro
    depends_on:
      init:
        condition: service_completed_successfully

  dashboard:
    image: ghcr.io/karamble/dcrpulse-dashboard:2.0.0-rc2@sha256:7d8d8030acd87c67b23773980453be320de1cfb92784ca1dbc82944fe2eb2664
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd:ro
      - ${APP_DATA_DIR}/dcrdex:/app-data/dcrdex:ro
      - ${APP_DATA_DIR}/dashboard:/dashboard-data
    environment:
      PORT: 8735
      TRUSTED_PROXY: "true"
      DCRD_RPC_HOST: dcrd
      DCRD_RPC_PORT: 9109
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRWALLET_RPC_HOST: dcrwallet
      DCRWALLET_RPC_PORT: 9110
      DCRWALLET_GRPC_PORT: 9111
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRWALLET_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRLND_HOST: dcrlnd
      DCRLND_GRPC_PORT: 10009
      DCRLND_TLS_CERT: /app-data/dcrlnd/tls.cert
      DCRLND_MACAROON: /app-data/dcrlnd/admin.macaroon
      BRCLIENTD_HOST: brclientd
      BRCLIENTD_PORT: 7676
      BRCLIENTD_STATUS_PORT: 7677
      BRCLIENTD_DATA_DIR: /app-data/brclientd
      DCRDEX_RPC_HOST: dcrdex
      DCRDEX_RPC_PORT: 5757
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
      DCRDEX_RPC_CERT: /app-data/dcrdex/rpc.cert
      DCRDEX_WS_PORT: 5758
      DCRDEX_WS_CERT: /app-data/dcrdex/web.cert
    depends_on:
      init:
        condition: service_completed_successfully
      dcrd:
        condition: service_healthy
      dcrwallet:
        condition: service_healthy
