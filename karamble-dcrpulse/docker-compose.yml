services:
  app_proxy:
    environment:
      APP_HOST: karamble-dcrpulse_dashboard_1
      APP_PORT: 8735

  init:
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    user: "0:0"
    restart: "no"
    command: ["sh", "-c", "mkdir -p /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex /host/tor && chown -R 1000:1000 /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex /host/tor"]
    volumes:
      - ${APP_DATA_DIR}:/host

  dcrd:
    image: ghcr.io/karamble/dcrpulse-dcrd:2.1.5@sha256:7f3227bf99a6be2d173daf43aacb7bf405d81fd4ba78f8f35a37ba2116ef5138
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
      - ${APP_DATA_DIR}/tor:/app-data/tor:ro
    environment:
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_EXTRA_ARGS: --txindex
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    command: >
      --rpcuser=${APP_SEED}
      --rpcpass=${APP_SEED}
      --rpclisten=0.0.0.0:9109
      --rpccert=/app-data/dcrd/rpc.cert
      --rpckey=/app-data/dcrd/rpc.key
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -k -u ${APP_SEED}:${APP_SEED} -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"1.0\",\"method\":\"getinfo\",\"params\":[],\"id\":1}' https://127.0.0.1:9109 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      init:
        condition: service_completed_successfully

  dcrwallet:
    image: ghcr.io/karamble/dcrpulse-dcrwallet:2.1.5@sha256:58c52c67e788936e301edca10aa32f98997f460cb43b23bb277e9e926f7d4502
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
    environment:
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_HOST: dcrd
      DCRWALLET_GAP_LIMIT: 400
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    depends_on:
      dcrd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9110 && nc -z 127.0.0.1 9111 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  dcrlnd:
    image: ghcr.io/karamble/dcrpulse-dcrlnd:0.8.1@sha256:2aed1e2620c7e2611c75d3f850222db2a1cdda246a06e376e823b825a6f756e3
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
    environment:
      DCRWALLET_HOST: dcrwallet
      DCRWALLET_GRPC_PORT: 9111
      LN_TESTNET: "false"
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    depends_on:
      init:
        condition: service_completed_successfully
      dcrwallet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 10009 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  brclientd:
    image: ghcr.io/karamble/dcrpulse-brclientd:0.2.3@sha256:61557d2f82ef3a7084643794500a54a206faed295b988185aa35a30155a9b437
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd:ro
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd
    depends_on:
      init:
        condition: service_completed_successfully
      dcrlnd:
        condition: service_started

  dcrdex:
    image: ghcr.io/karamble/dcrpulse-dcrdex:1.0.6@sha256:802962150257cb63d087b8184c771b99ee95eca84241f8b5dbe35565e72a751f
    hostname: dcrdex
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    volumes:
      - ${APP_DATA_DIR}/dcrdex:/dex/.dexc
      - ${APP_DATA_DIR}/data:/app-data:ro
    depends_on:
      init:
        condition: service_completed_successfully

  dashboard:
    image: ghcr.io/karamble/dcrpulse-dashboard:latest@sha256:97314478fcef4a67dd4070eb4faab28902546ee23ab6ac630eea8b766f8a3b3a
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd:ro
      - ${APP_DATA_DIR}/dcrdex:/app-data/dcrdex:ro
      - ${APP_DATA_DIR}/dashboard:/dashboard-data
      - ${APP_DATA_DIR}/tor:/app-data/tor:ro
    environment:
      PORT: 8735
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
      TOR_CONTROL_PORT: 9051
      TRUSTED_PROXY: "true"
      DCRD_RPC_HOST: dcrd
      DCRD_RPC_PORT: 9109
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRWALLET_RPC_HOST: dcrwallet
      DCRWALLET_RPC_PORT: 9110
      DCRWALLET_GRPC_PORT: 9111
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRWALLET_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRLND_HOST: dcrlnd
      DCRLND_GRPC_PORT: 10009
      DCRLND_TLS_CERT: /app-data/dcrlnd/tls.cert
      DCRLND_MACAROON: /app-data/dcrlnd/admin.macaroon
      BRCLIENTD_HOST: brclientd
      BRCLIENTD_PORT: 7676
      BRCLIENTD_STATUS_PORT: 7677
      BRCLIENTD_DATA_DIR: /app-data/brclientd
      DCRDEX_RPC_HOST: dcrdex
      DCRDEX_RPC_PORT: 5757
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
      DCRDEX_RPC_CERT: /app-data/dcrdex/rpc.cert
      DCRDEX_WS_PORT: 5758
      DCRDEX_WS_CERT: /app-data/dcrdex/web.cert
    depends_on:
      init:
        condition: service_completed_successfully
      dcrd:
        condition: service_healthy
      dcrwallet:
        condition: service_healthy

  tor:
    image: ghcr.io/karamble/dcrpulse-tor:0.4.7.8@sha256:2188228c3f09866d1ea704c3424651788b36d155872915685def7d17e8921ec8
    user: "1000:1000"
    restart: on-failure
    environment:
      HOME: /tmp
    volumes:
      - ${APP_DATA_DIR}/tor:/data
    depends_on:
      init:
        condition: service_completed_successfully
      dcrd:
        condition: service_started

  widget:
    image: ghcr.io/karamble/dcrpulse-widgetumbrel:latest@sha256:ad96d15c01da31fcfeae1c3d556a105f9351a990eeb5941158e4641188a8106b
    user: "1000:1000"
    restart: on-failure
    environment:
      LISTEN: ":3000"
      DCRD_RPC_HOST: dcrd
      DCRD_RPC_PORT: 9109
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_CERT: /app-data/dcrd/rpc.cert
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
    depends_on:
      dcrd:
        condition: service_healthy
