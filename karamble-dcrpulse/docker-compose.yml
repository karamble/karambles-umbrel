services:
  app_proxy:
    environment:
      APP_HOST: karamble-dcrpulse_dashboard_1
      APP_PORT: 8735

  init:
    image: alpine:3.22@sha256:310c62b5e7ca5b08167e4384c68db0fd2905dd9c7493756d356e893909057601
    user: "0:0"
    restart: "no"
    command: ["sh", "-c", "mkdir -p /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex /host/tor && chown -R 1000:1000 /host/dashboard /host/dcrlnd /host/brclientd /host/dcrdex /host/tor"]
    volumes:
      - ${APP_DATA_DIR}:/host

  dcrd:
    image: ghcr.io/karamble/dcrpulse-dcrd:latest@sha256:491a9378fc0825adbf21c267b752f3dd3d3be33aec9e922aa0507f1025794378
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 5m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
      - ${APP_DATA_DIR}/tor:/app-data/tor:ro
    environment:
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_EXTRA_ARGS: --txindex
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    command: >
      --rpcuser=${APP_SEED}
      --rpcpass=${APP_SEED}
      --rpclisten=0.0.0.0:9109
      --rpccert=/app-data/dcrd/rpc.cert
      --rpckey=/app-data/dcrd/rpc.key
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -k -u ${APP_SEED}:${APP_SEED} -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"1.0\",\"method\":\"getinfo\",\"params\":[],\"id\":1}' https://127.0.0.1:9109 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      init:
        condition: service_completed_successfully

  dcrwallet:
    image: ghcr.io/karamble/dcrpulse-dcrwallet:latest@sha256:1a7d868f4fd0db03c03eb0c3955ceb9d7f106ef3a3fe24ce446a5cced634a9b7
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
    environment:
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_HOST: dcrd
      DCRWALLET_GAP_LIMIT: 400
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    depends_on:
      dcrd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9110 && nc -z 127.0.0.1 9111 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  dcrlnd:
    image: ghcr.io/karamble/dcrpulse-dcrlnd:latest@sha256:3a0420c2be23a44d302b1e58ca3e62884e614dbd84cede0a4cc1de6950cebfd9
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
    environment:
      DCRWALLET_HOST: dcrwallet
      DCRWALLET_GRPC_PORT: 9111
      LN_TESTNET: "false"
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    depends_on:
      init:
        condition: service_completed_successfully
      dcrwallet:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 10009 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  brclientd:
    image: ghcr.io/karamble/dcrpulse-brclientd:latest@sha256:c395ccc5abf4171780223a1f1839f5cf69d378e3d521a55f279d1208245e3a4b
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    volumes:
      - ${APP_DATA_DIR}/data:/app-data:ro
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd:ro
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd
    depends_on:
      init:
        condition: service_completed_successfully
      dcrlnd:
        condition: service_started

  dcrdex:
    image: ghcr.io/karamble/dcrpulse-dcrdex:latest@sha256:865520f968f4a32996b9abbffa277ed8c06760a83db00a073384d5edd3223b0b
    hostname: dcrdex
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
    volumes:
      - ${APP_DATA_DIR}/dcrdex:/dex/.dexc
      - ${APP_DATA_DIR}/data:/app-data:ro
    depends_on:
      init:
        condition: service_completed_successfully

  dashboard:
    image: ghcr.io/karamble/dcrpulse-dashboard:latest@sha256:a6246db61a447f80cdbb049897928a56b7f10ebb01edd1bc755db76c4cb51525
    user: "1000:1000"
    restart: on-failure
    volumes:
      - ${APP_DATA_DIR}/data:/app-data
      - ${APP_DATA_DIR}/dcrlnd:/app-data/dcrlnd
      - ${APP_DATA_DIR}/brclientd:/app-data/brclientd:ro
      - ${APP_DATA_DIR}/dcrdex:/app-data/dcrdex:ro
      - ${APP_DATA_DIR}/dashboard:/dashboard-data
      - ${APP_DATA_DIR}/tor:/app-data/tor:ro
    environment:
      PORT: 8735
      TOR_PROXY_IP: tor
      TOR_PROXY_PORT: 9050
      TOR_CONTROL_PORT: 9051
      TRUSTED_PROXY: "true"
      DCRD_RPC_HOST: dcrd
      DCRD_RPC_PORT: 9109
      DCRD_RPC_USER: ${APP_SEED}
      DCRD_RPC_PASS: ${APP_SEED}
      DCRD_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRWALLET_RPC_HOST: dcrwallet
      DCRWALLET_RPC_PORT: 9110
      DCRWALLET_GRPC_PORT: 9111
      DCRWALLET_RPC_USER: ${APP_SEED}
      DCRWALLET_RPC_PASS: ${APP_SEED}
      DCRWALLET_RPC_CERT: /app-data/dcrd/rpc.cert
      DCRLND_HOST: dcrlnd
      DCRLND_GRPC_PORT: 10009
      DCRLND_TLS_CERT: /app-data/dcrlnd/tls.cert
      DCRLND_MACAROON: /app-data/dcrlnd/admin.macaroon
      BRCLIENTD_HOST: brclientd
      BRCLIENTD_PORT: 7676
      BRCLIENTD_STATUS_PORT: 7677
      BRCLIENTD_DATA_DIR: /app-data/brclientd
      DCRDEX_RPC_HOST: dcrdex
      DCRDEX_RPC_PORT: 5757
      DCRDEX_RPC_USER: ${APP_SEED}
      DCRDEX_RPC_PASS: ${APP_SEED}
      DCRDEX_RPC_CERT: /app-data/dcrdex/rpc.cert
      DCRDEX_WS_PORT: 5758
      DCRDEX_WS_CERT: /app-data/dcrdex/web.cert
    depends_on:
      init:
        condition: service_completed_successfully
      dcrd:
        condition: service_healthy
      dcrwallet:
        condition: service_healthy

  tor:
    image: ghcr.io/karamble/dcrpulse-tor:latest@sha256:e1de137b70460c5b0771521b7b900829757b5e8ae3544a5c93df55540e4c381d
    user: "1000:1000"
    restart: on-failure
    environment:
      HOME: /tmp
    volumes:
      - ${APP_DATA_DIR}/tor:/data
    depends_on:
      init:
        condition: service_completed_successfully
      dcrd:
        condition: service_started
